function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function AnimatedSection({ children, delay = 0, className = "" }) {
  const [ref, visible] = useInView();
  return (
    <div ref={ref} className={className} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(40px)",
      transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
    }}>
      {children}
    </div>
  );
}

      <section id="packages" style={{ padding: "100px 5%", background: "rgba(255,107,157,0.02)", position: "relative", overflow: "hidden" }}>
        <div style={{ maxWidth: "1200px", margin: "0 auto" }}>
          <AnimatedSection>
            <div style={{ textAlign: "center", marginBottom: "60px" }}>
              <div style={{ fontFamily: "'Unbounded', sans-serif", fontSize: "0.7rem", letterSpacing: "0.2em", color: "#ff6b9d", marginBottom: "12px" }}>✦ ПАКЕТИ</div>
              <h2 style={{ fontFamily: "'Unbounded', sans-serif", fontWeight: 900, fontSize: "clamp(1.8rem, 4vw, 3rem)" }}>Послуги та ціни</h2>
              <p style={{ color: "rgba(255,255,255,0.4)", marginTop: "12px", fontSize: "0.9rem" }}>Instagram + TikTok · Без зйомки</p>
            </div>
          </AnimatedSection>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: "24px" }}>
            {PACKAGES.map((pkg, i) => (
              <AnimatedSection key={pkg.name} delay={i * 0.12}>
                <div className="pkg-card" style={{
                  background: pkg.popular ? "linear-gradient(135deg, rgba(255,107,157,0.12), rgba(196,77,255,0.12))" : "rgba(255,255,255,0.03)",
                  border: `2px solid ${pkg.popular ? "#ff6b9d" : "rgba(255,255,255,0.08)"}`,
                  borderRadius: "24px", overflow: "hidden", transition: "all 0.4s", position: "relative",
                  boxShadow: pkg.popular ? "0 0 40px rgba(255,107,157,0.15)" : "none",
                }}>
                  {pkg.popular && (
                    <div style={{ position: "absolute", top: "16px", right: "16px", background: "linear-gradient(135deg, #ff6b9d, #c44dff)", borderRadius: "50px", padding: "4px 14px", fontFamily: "'Unbounded', sans-serif", fontSize: "0.6rem", fontWeight: 700, letterSpacing: "0.1em" }}>
                      ХІТ
                    </div>
                  )}
                  {/* Package Image */}
                  {!imgErrors[pkg.imgIndex] ? (
                    <img src={IMG_PATHS[pkg.imgIndex]} alt={pkg.name} onError={() => handleImgError(pkg.imgIndex)}
                      style={{ width: "100%", display: "block", objectFit: "contain", background: "#f5f0f2", maxHeight: "420px" }} />
                  ) : (
                    <div style={{ height: "200px", background: `linear-gradient(135deg, ${pkg.color}22, rgba(0,0,0,0.5))`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <span style={{ fontFamily: "'Unbounded', sans-serif", fontWeight: 900, fontSize: "2rem", color: pkg.color }}>{pkg.name}</span>
                    </div>
                  )}
                  <div style={{ padding: "24px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "20px" }}>
                      <span style={{ fontFamily: "'Unbounded', sans-serif", fontWeight: 900, fontSize: "1.4rem", color: pkg.color }}>{pkg.name}</span>
                      <span style={{ background: `${pkg.color}22`, border: `1px solid ${pkg.color}44`, borderRadius: "50px", padding: "3px 10px", fontSize: "0.65rem", color: pkg.color, fontFamily: "'Unbounded', sans-serif" }}>{pkg.badge}</span>
                    </div>
                    <ul style={{ listStyle: "none", display: "flex", flexDirection: "column", gap: "10px", marginBottom: "24px" }}>
                      {pkg.items.map(item => (
                        <li key={item} style={{ display: "flex", alignItems: "center", gap: "10px", color: "rgba(255,255,255,0.75)", fontSize: "0.85rem" }}>
                          <span style={{ color: pkg.color, fontSize: "0.7rem" }}>✦</span>
                          {item}
                        </li>
                      ))}
                    </ul>
                    <GlowBtn href="https://t.me/kliukai_smm" style={{ width: "100%", textAlign: "center", background: pkg.popular ? "linear-gradient(135deg, #ff6b9d, #c44dff)" : "transparent", border: `2px solid ${pkg.color}`, boxShadow: `0 0 20px ${pkg.color}44` }}>
                      Обрати пакет
                    </GlowBtn>
                  </div>
                </div>
              </AnimatedSection>
            ))}
          </div>
        </div>
      </section>

      {/* REVIEWS */}
      <section id="reviews" style={{ padding: "100px 5%", maxWidth: "900px", margin: "0 auto" }}>
        <AnimatedSection>
          <div style={{ textAlign: "center", marginBottom: "60px" }}>
            <div style={{ fontFamily: "'Unbounded', sans-serif", fontSize: "0.7rem", letterSpacing: "0.2em", color: "#ff6b9d", marginBottom: "12px" }}>✦ ВІДГУКИ</div>
            <h2 style={{ fontFamily: "'Unbounded', sans-serif", fontWeight: 900, fontSize: "clamp(1.8rem, 4vw, 3rem)" }}>Клієнти про мене</h2>
          </div>
        </AnimatedSection>
        <div style={{ position: "relative", overflow: "hidden" }}>
          <div style={{ display: "flex", transition: "transform 0.6s ease", transform: `translateX(-${activeReview * 100}%)` }}>
            {REVIEWS.map((r) => (
              <div key={r.name} style={{ minWidth: "100%", padding: "0 8px" }}>
                <div style={{ background: "rgba(255,107,157,0.06)", border: "1px solid rgba(255,107,157,0.2)", borderRadius: "24px", padding: "40px", textAlign: "center", backdropFilter: "blur(10px)" }}>
                  <div style={{ fontSize: "1.2rem", marginBottom: "16px" }}>{"★".repeat(r.stars)}</div>
                  <p style={{ fontSize: "1.1rem", lineHeight: 1.7, color: "rgba(255,255,255,0.8)", fontStyle: "italic", marginBottom: "24px", maxWidth: "600px", margin: "0 auto 24px" }}>
                    "{r.text}"
                  </p>
                  <div style={{ fontFamily: "'Unbounded', sans-serif", fontWeight: 700, color: "#ff6b9d", fontSize: "0.85rem" }}>{r.name}</div>
                  <div style={{ color: "rgba(255,255,255,0.4)", fontSize: "0.75rem", marginTop: "4px" }}>{r.biz}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: "8px", marginTop: "24px" }}>
            {REVIEWS.map((_, i) => (
              <button key={i} onClick={() => setActiveReview(i)} style={{ width: i === activeReview ? "24px" : "8px", height: "8px", borderRadius: "4px", background: i === activeReview ? "#ff6b9d" : "rgba(255,255,255,0.2)", border: "none", cursor: "pointer", transition: "all 0.3s" }} />
            ))}
          </div>
        </div>
      </section>

      {/* CTA */}
      <section style={{ padding: "100px 5%", textAlign: "center", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at center, rgba(255,107,157,0.12) 0%, transparent 70%)", pointerEvents: "none" }} />
        <AnimatedSection>
          <div style={{ maxWidth: "700px", margin: "0 auto", position: "relative", zIndex: 1 }}>
            <div style={{ fontFamily: "'Unbounded', sans-serif", fontSize: "0.7rem", letterSpacing: "0.2em", color: "#ff6b9d", marginBottom: "16px" }}>✦ ПОЧНІТЬ ЗАРАЗ</div>
            <h2 style={{ fontFamily: "'Unbounded', sans-serif", fontWeight: 900, fontSize: "clamp(2rem, 5vw, 3.5rem)", lineHeight: 1.15, marginBottom: "20px" }}>
              Готові масштабувати свій <span style={{ background: "linear-gradient(135deg, #ff6b9d, #c44dff)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Instagram</span>?
            </h2>
            <p style={{ color: "rgba(255,255,255,0.5)", fontSize: "1rem", marginBottom: "40px", lineHeight: 1.7 }}>
              Напишіть мені — обговоримо ваш проєкт безкоштовно
            </p>
            <div style={{ display: "flex", gap: "16px", justifyContent: "center", flexWrap: "wrap" }}>
              <GlowBtn href="https://t.me/kliukai_smm" style={{ fontSize: "1rem", padding: "18px 48px" }}>
                ✈️ Написати в Telegram
              </GlowBtn>
              <GlowBtn href="https://instagram.com/kliukai.smm" outline style={{ fontSize: "1rem", padding: "18px 48px" }}>
                📸 Instagram Direct
              </GlowBtn>
            </div>
          </div>
        </AnimatedSection>
      </section>

      {/* FOOTER */}
      <footer style={{ borderTop: "1px solid rgba(255,107,157,0.1)", padding: "40px 5%", display: "flex", flexWrap: "wrap", justifyContent: "space-between", alignItems: "center", gap: "20px", maxWidth: "1200px", margin: "0 auto" }}>
        <div style={{ fontFamily: "'Unbounded', sans-serif", fontWeight: 900, fontSize: "1rem", color: "#ff6b9d" }}>
          KLIUKAI<span style={{ color: "#fff" }}>.SMM</span>
          <div style={{ fontFamily: "'Cormorant Garamond', serif", fontWeight: 300, fontSize: "0.75rem", color: "rgba(255,255,255,0.3)", marginTop: "4px", letterSpacing: "0.1em" }}>Створюємо контент, який працює</div>
        </div>
        <div style={{ display: "flex", gap: "20px" }}>
          {[["📸", "Instagram", "https://instagram.com/kliukai.smm"], ["✈️", "Telegram", "https://t.me/kliukai_smm"], ["🎵", "TikTok", "https://tiktok.com/@kliukai.smm"]].map(([ic, name, href]) => (
            <a key={name} href={href} style={{ display: "flex", alignItems: "center", gap: "6px", color: "rgba(255,255,255,0.5)", textDecoration: "none", fontFamily: "'Unbounded', sans-serif", fontSize: "0.7rem", letterSpacing: "0.08em", transition: "color 0.2s" }}
              onMouseEnter={e => e.currentTarget.style.color = "#ff6b9d"}
              onMouseLeave={e => e.currentTarget.style.color = "rgba(255,255,255,0.5)"}>
              {ic} {name}
            </a>
          ))}
        </div>
        <div style={{ color: "rgba(255,255,255,0.25)", fontSize: "0.7rem", fontFamily: "'Unbounded', sans-serif" }}>
          © 2025 KLIUKAI.SMM
        </div>
      </footer>

      <style>{`
        @keyframes spin {
          from { opacity: 0.6; }
          50% { opacity: 1; }
          to { opacity: 0.6; }
        }
        @keyframes pulse {
          0%, 100% { opacity: 0.3; transform: scaleY(1); }
          50% { opacity: 1; transform: scaleY(1.2); }
        }
        @media (max-width: 768px) {
          .nav-desktop { display: none !important; }
          .hamburger { display: block !important; }
        }
      `}</style>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
